services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: manual_canvas
      POSTGRES_PASSWORD: manual_canvas
      POSTGRES_DB: manual_canvas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manual_canvas"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+pg8000://manual_canvas:manual_canvas@postgres:5432/manual_canvas
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: rpc://
      STORAGE_DIR: /app/storage
      JWT_SECRET_KEY: change-me-in-production
    volumes:
      - ./backend/storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+pg8000://manual_canvas:manual_canvas@postgres:5432/manual_canvas
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: rpc://
      STORAGE_DIR: /app/storage
      JWT_SECRET_KEY: change-me-in-production
    volumes:
      - ./backend/storage:/app/storage
    depends_on:
      backend:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
